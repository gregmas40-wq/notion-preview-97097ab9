.header{
  display:flex; gap:14px; align-items:flex-start; justify-content:space-between; flex-wrap:wrap;
  background:rgba(255,255,255,.86);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  box-shadow:var(--shadow);
  backdrop-filter: blur(10px);
}
.h-left{display:flex; gap:12px; align-items:flex-start;}
.badge{

}
.h-title{margin:0;font-size:20px;line-height:1.25;}

.btn{

  font-weight:900;

.btn:hover{transform: translateY(-1px); border-color: rgba(99,102,241,.35);}
.btn.primary{
  background: linear-gradient(135deg, rgba(99,102,241,.92), rgba(16,185,129,.92));

}

.main{margin-top:18px;display:grid;grid-template-columns: 300px 1fr;gap:16px;}

.side{
  background:rgba(255,255,255,.82);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:14px;
  backdrop-filter: blur(10px);
}
.side-title{margin:4px 0 10px 0;font-size:14px;color:var(--muted);font-weight:1000;}
.nav{display:flex;flex-direction:column;gap:8px;}
.nav button{
  text-align:left;width:100%;
  border:1px solid var(--border);
  background:var(--panel);
  border-radius:14px;
  padding:10px;
  cursor:pointer;
  font-weight:1000;
  display:flex;gap:10px;align-items:center;
}
.nav button .ico{width:22px;text-align:center;}
.nav button .hint{margin-left:auto;color:var(--muted);font-size:12px;font-weight:1000;}
.nav button.active{
  border-color: rgba(99,102,241,.55);
  box-shadow: 0 10px 22px rgba(99,102,241,.10);
  background: linear-gradient(180deg, rgba(99,102,241,.09), rgba(255,255,255,.9));
}

.panel{
  background:rgba(255,255,255,.88);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:var(--shadow);
  padding:16px 16px 20px 16px;
  backdrop-filter: blur(10px);
}
.section-title{display:flex;align-items:center;gap:10px;margin:0 0 10px 0;font-size:18px;}
.pill{
  font-size:12px;font-weight:1000;
  padding:6px 10px;border-radius:999px;
  border:1px solid rgba(99,102,241,.25);
  background:rgba(99,102,241,.10);
  color:#3730a3;
}
.card{border:1px solid var(--border);border-radius:16px;background:var(--panel);padding:12px;}
.card h4{margin:0 0 6px 0;font-size:14px;}
.card p{margin:0;color:var(--muted);font-size:13px;line-height:1.55;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media (max-width: 900px){ .grid2{grid-template-columns:1fr;} }

.kv{
  display:flex;gap:10px;align-items:flex-start;
  padding:10px 12px;
  border:1px dashed rgba(99,102,241,.35);
  background: rgba(99,102,241,.06);
  border-radius:14px;
  margin:10px 0;
}
.kv .k-ico{width:22px;text-align:center;}
.kv .k-title{font-weight:1000;}
.kv .k-desc{color:var(--muted);font-weight:900;font-size:13px;line-height:1.5;}

.callout{
  border-radius:16px;
  padding:12px;
  border:1px solid var(--border);
  background: rgba(245,158,11,.10);
}
.callout strong{color:#7c2d12;}
.list{margin:8px 0 0 0; padding-left:18px; color:var(--muted); font-weight:900;}
.list li{margin:6px 0; line-height:1.55;}
.mini{font-size:12px;color:var(--muted);font-weight:1000;margin-top:6px;}
.hl{font-weight:1000;}
.hl.brand{color:#3730a3;}
.hl.ok{color:#047857;}
.hl.warn{color:#b45309;}
.hl.danger{color:#b91c1c;}
hr.sep{border:0;border-top:1px solid var(--border);margin:14px 0;}
.actions{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;}
.actions .btn{flex:1;min-width:140px;}
</style>

의지</li>\n            <li>병원 분위기/설명 방식 중요</li>\n          </ul>\n        </div>\n      </div>\n\n      <div className=\"callout\">\n        <strong>팀원 멘트(짧게)</strong>\n        <div className=\"mini\">“여기서는 ○○님 몸 상태에 맞춰 계획을 먼저 정리해드리고, 그 계획대로 같이 가요.”</div>\n      </div>\n    </div>\n  );\n}\n\nfunction NotCore(){\n  return (\n    <div>\n      <h2 className=\"section-title\">🚫 비핵심 청중 <span className=\"pill\">주의</span></h2>\n\n      <div className=\"card\">\n        <h4>이런 분은 우리 방식이 부담일 수 있어요</h4>\n        <ul className=\"list\">\n          <li>치료자가 리드하는 방식이 부담</li>\n          <li>초기 집중 치료/규칙 방문이 어려움</li>\n          <li>패키지 권유 자체에 거부감</li>\n          <li>최선보다 최저가 우선</li>\n        </ul>\n      </div>\n\n      <div className=\"callout\">\n        <strong>팀원 포인트</strong>\n        <div className=\"mini\">억지로 설득하지 말고, 친절 + 기본 안내를 하고 의료진에게 공유합니다.</div>\n      </div>\n    </div>\n  );\n}\n\nfunction TeamIdentity(){\n  return (\n    <div>\n      <h2 className=\"section-title\">🧑‍🤝‍🧑 팀원 정체성 <span className=\"pill\">내 역할</span></h2>\n\n      <div className=\"grid2\">\n        <div className=\"card\">\n          <h4>팀원은 누구?</h4>\n          <p>차분하게 상황을 살피고, 치료 계획에 따라 환자를 보살피는 <span className=\"hl brand\">조력자</span>.</p>\n        </div>\n        <div className=\"card\">\n          <h4>환자가 느껴야 할 메시지</h4>\n          <p>“이 사람들은 정말 나를 고쳐주려고 하는구나.”</p>\n        </div>\n      </div>\n\n      <div className=\"kv\">\n        <div className=\"k-ico\">📌</div>\n        <div>\n          <div className=\"k-title\">팀원이 꼭 하는 행동 3개</div>\n          <div className=\"k-desc\">\n            1) 계획을 짧게 정리<br/>\n            2) 환자 불안을 읽고 공감<br/>\n            3) 중요한 정보는 의료진에게 공유\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}\n\nfunction Talking(){\n  return (\n    <div>\n      <h2 className=\"section-title\">🗣️ 계획된 말하기(팀원용) <span className=\"pill\">실전</span></h2>\n\n      <div className=\"card\">\n        <h4>말의 3가지(중학생 버전)</h4>\n        <ul className=\"list\">\n          <li><span className=\"hl brand\">이성</span>: “왜 그런지” 설명</li>\n          <li><span className=\"hl ok\">감정</span>: “많이 힘드셨죠” 공감</li>\n          <li><span className=\"hl warn\">리드</span>: “그래서 이렇게 해볼게요” 계획 제시</li>\n        </ul>\n      </div>\n\n      <div className=\"callout\">\n        <strong>금지 멘트</strong>\n        <ul className=\"list\">\n          <li>“그건 뭐 다 그래요.”</li>\n          <li>“그건 스트레스 때문이에요.”</li>\n          <li>“그건 병은 아닌데요.”</li>\n        </ul>\n      </div>\n\n      <div className=\"kv\">\n        <div className=\"k-ico\">✨</div>\n        <div>\n          <div className=\"k-title\">진짜 관심, 이렇게 보이게</div>\n          <div className=\"k-desc\">\n            - 일상 질문: “업무 중 오래 앉아계세요?”<br/>\n            - 기억하기: “지난주보다 덜 아프셨죠?”<br/>\n            - 상태 언급: “오늘 많이 지쳐 보이세요.”\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}\n\nfunction App(){\n  const [active, setActive] = useState('intro');\n  const current = useMemo(()=> SECTIONS.find(s=>s.key===active) || SECTIONS[0], [active]);\n\n  const Comp = useMemo(()=>{\n    switch(active){\n      case 'intro': return () => <Intro go={setActive}/>;\n      case 'world': return World;\n      case 'core': return CorePatient;\n      case 'not': return NotCore;\n      case 'team': return TeamIdentity;\n      case 'talk': return Talking;\n      case 'quiz': return Quiz;\n      default: return () => <Intro go={setActive}/>;\n    }\n  }, [active]);\n\n  return (\n    <div className=\"wrap\">\n      <div className=\"header\">\n        <div className=\"h-left\">\n          <div className=\"badge\">🧑‍🤝‍🧑</div>\n          <div>\n            <h1 className=\"h-title\">페르소나 교육 — 팀원용</h1>\n            <p className=\"h-sub\">한 페이지로 이해/습득 · 밝은 화면 · 강조 포인트 · 마지막 퀴즈</p>\n          </div>\n        </div>\n      </div>\n\n      <div className=\"main\">\n        <aside className=\"side\">\n          <div className=\"side-title\">📚 목차(순서대로)</div>\n          <div className=\"nav\">\n            {SECTIONS.map(s => (\n              <button key
